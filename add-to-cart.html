<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Cart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>🛍️ Shop</h1>

  <div class="products">
    <div class="product">
      <h3>Shirt</h3>
      <p>$20</p>
      <button onclick="addToCart(1, 'Shirt', 20)">Add to Cart</button>
    </div>

    <div class="product">
      <h3>Shoes</h3>
      <p>$50</p>
      <button onclick="addToCart(2, 'Shoes', 50)">Add to Cart</button>
    </div>
  </div>

  <h2>🛒 Cart</h2>
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="cart-body"></tbody>
  </table>

  <h3 id="grand-total">Total: $0</h3>

  <script src="script.js"></script>
</body>
</html>
