<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f9f9f9;
        }

        header {
            background: #333;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .title {
            text-align: center;
            margin: 30px 0;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 0 40px 40px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .product h3 {
            margin: 10px 0;
        }

        .price {
            color: #ff4d6d;
            font-weight: bold;
        }

        .btn {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #ff4d6d;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #e63950;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <h1>Glow Beauty Shop</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <h2 class="title">Our Products</h2>

    <div class="products">

        <div class="product">
            <img src="https://picsum.photos/300/200?1">
            <h3>Face Cleanser</h3>
            <p class="price">$15</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://picsum.photos/300/200?2">
            <h3>Body Lotion</h3>
            <p class="price">$20</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://picsum.photos/300/200?3">
            <h3>Hair Oil</h3>
            <p class="price">$18</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://picsum.photos/300/200?4">
            <h3>Skin Care Set</h3>
            <p class="price">$35</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://picsum.photos/300/200?5">
            <h3>Face Cream</h3>
            <p class="price">$22</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="product">
            <img src="2.jpg">
            <h3>Gift Box</h3>
            <p class="price">$40</p>
            <button class="btn">Add to Cart</button>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Glow Beauty Shop</p>
    </footer>

</body>
</html>
